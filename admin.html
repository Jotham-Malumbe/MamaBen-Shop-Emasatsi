<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MamaBen's Shop Emasatsi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/logo.png" type="image/png">
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-gray-900 dark:text-gray-100 min-h-screen">

    <div class="max-w-md mx-auto px-6 py-20">
        
        <!-- Login Screen -->
        <div id="login-screen" class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl p-10">
            <div class="text-center mb-10">
                <div class="w-20 h-20 mx-auto bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-5xl mb-6">🔑</div>
                <h1 class="text-3xl font-bold">Admin Dashboard</h1>
                <p class="text-gray-500 mt-2">MamaBen's Shop - Emasatsi</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="admin-password" 
                           class="w-full px-6 py-4 border border-gray-300 dark:border-slate-700 rounded-3xl focus:outline-none focus:border-emerald-500 bg-transparent"
                           placeholder="Enter admin password">
                </div>

                <button onclick="loginAdmin()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-5 rounded-3xl text-lg">
                    Login to Dashboard
                </button>

                <p class="text-center text-xs text-gray-500 mt-4">
                    Default password: <strong>admin123</strong>
                </p>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-dashboard" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-4xl font-bold">Admin Dashboard</h1>
                    <p class="text-gray-500">Manage Products</p>
                </div>
                <button onclick="logoutAdmin()" 
                        class="px-8 py-3 border border-red-500 text-red-500 hover:bg-red-50 dark:hover:bg-red-950 rounded-3xl font-medium">
                    Logout
                </button>
            </div>

            <!-- Add New Product -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-8 mb-12 shadow-sm">
                <h2 class="text-2xl font-semibold mb-6">Add New Product</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Product Name</label>
                        <input type="text" id="new-name" class="w-full px-6 py-4 border border-gray-300 dark:border-slate-700 rounded-3xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Price (KSh)</label>
                        <input type="number" id="new-price" class="w-full px-6 py-4 border border-gray-300 dark:border-slate-700 rounded-3xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Category</label>
                        <input type="text" id="new-category" placeholder="Dairy, Staples, Household" 
                               class="w-full px-6 py-4 border border-gray-300 dark:border-slate-700 rounded-3xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Image URL</label>
                        <input type="text" id="new-image" placeholder="https://picsum.photos/..." 
                               class="w-full px-6 py-4 border border-gray-300 dark:border-slate-700 rounded-3xl">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <textarea id="new-description" rows="3" class="w-full px-6 py-4 border border-gray-300 dark:border-slate-700 rounded-3xl"></textarea>
                    </div>
                </div>
                <button onclick="addNewProduct()" 
                        class="mt-8 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-10 py-4 rounded-3xl">
                    Add Product
                </button>
            </div>

            <!-- Products List -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-8 shadow-sm">
                <h2 class="text-2xl font-semibold mb-6">All Products</h2>
                <div id="admin-products-list" class="space-y-6">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Admin functions embedded directly in the file
        let products = [];

        function loginAdmin() {
            const password = document.getElementById('admin-password').value;
            if (password === "admin123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadAdminProducts();
            } else {
                alert("Incorrect password! Default is: admin123");
            }
        }

        function logoutAdmin() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
            document.getElementById('admin-password').value = '';
        }

        function loadAdminProducts() {
            // Load from localStorage or products.json
            const saved = localStorage.getItem('mamaBensProducts');
            if (saved) {
                products = JSON.parse(saved);
            }
            renderAdminProducts();
        }

        function renderAdminProducts() {
            const container = document.getElementById('admin-products-list');
            if (!container) return;

            let html = '';
            products.forEach(product => {
                html += `
                    <div class="flex gap-4 items-center border-b dark:border-slate-700 pb-4">
                        <img src="${product.image}" alt="${product.name}" class="w-16 h-16 object-cover rounded-xl">
                        <div class="flex-1">
                            <p class="font-medium">${product.name}</p>
                            <p class="text-emerald-600">KSh ${product.price} • ${product.category}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editProduct(${product.id})" class="px-4 py-2 text-sm border rounded-xl">Edit</button>
                            <button onclick="deleteProduct(${product.id})" class="px-4 py-2 text-sm border border-red-500 text-red-500 rounded-xl">Delete</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html || '<p class="text-center py-8 text-gray-500">No products yet. Add some from the form above.</p>';
        }

        function addNewProduct() {
            const name = document.getElementById('new-name').value.trim();
            const price = parseInt(document.getElementById('new-price').value);
            const category = document.getElementById('new-category').value.trim();
            const image = document.getElementById('new-image').value.trim();
            const description = document.getElementById('new-description').value.trim();

            if (!name || !price || !category || !image) {
                alert("Please fill Name, Price, Category and Image URL");
                return;
            }

            const newProduct = {
                id: Date.now(),
                name,
                price,
                category,
                image,
                description: description || "No description"
            };

            products.unshift(newProduct);
            localStorage.setItem('mamaBensProducts', JSON.stringify(products));
            renderAdminProducts();

            // Clear form
            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-category').value = '';
            document.getElementById('new-image').value = '';
            document.getElementById('new-description').value = '';

            alert("Product added successfully!");
        }

        function editProduct(id) {
            alert("Edit feature coming soon. For now, delete and add again.");
        }

        function deleteProduct(id) {
            if (confirm("Delete this product?")) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('mamaBensProducts', JSON.stringify(products));
                renderAdminProducts();
            }
        }

        // Auto load products when dashboard opens
        function initAdmin() {
            // Nothing extra needed
        }

        window.onload = initAdmin;
    </script>
</body>
</html>
